services:
  postgres:
    image: postgres:16
    container_name: gamematch-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: p1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d

  auth-service:
    image: auth-service:latest
    container_name: auth-service
    restart: always
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gamematch_auth
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: p1234
      JWT_SECRET: mysecretkeymysecretkeymysecretkey123456
      JWT_EXPIRATION: 86400000
    depends_on:
      - postgres

  room-service:
    image: room-service:latest
    container_name: room-service
    restart: always
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gamematch_room
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: p1234
    depends_on:
      - postgres

  chat-service:
    image: chat-service:latest
    container_name: chat-service
    restart: always
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/gamematch_chat
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: p1234
    depends_on:
      - postgres

  gateway-service:
    image: gateway-service:latest
    container_name: gateway-service
    restart: always
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      ROOM_SERVICE_URL: http://room-service:8085
      CHAT_SERVICE_URL: http://chat-service:8083
    depends_on:
      - auth-service
      - room-service
      - chat-service

volumes:
  postgres_data: