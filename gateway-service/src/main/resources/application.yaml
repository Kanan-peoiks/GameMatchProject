server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://auth-service:8081}
          predicates:
            - Path=/api/auth/**

        - id: room-service
          uri: ${ROOM_SERVICE_URL:http://room-service:8085}
          predicates:
            - Path=/api/rooms/**

        - id: chat-service
          uri: ${CHAT_SERVICE_URL:http://chat-service:8083}
          predicates:
            - Path=/api/chat/**