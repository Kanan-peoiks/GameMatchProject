server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/**

            - id: room-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/rooms/**

            - id: chat-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/chat/**