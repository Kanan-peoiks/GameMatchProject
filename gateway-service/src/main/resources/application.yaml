server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: room-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/rooms/**

        - id: chat-service
          uri: http://localhost:8083
          predicates:
            - Path=/ws/**, /api/chat/**

logging:
  level:
    org.springframework.cloud.gateway: DEBUG